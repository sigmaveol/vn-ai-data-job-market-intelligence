# Copy values into Streamlit Cloud secrets or local .streamlit/secrets.toml.
# Do not commit real secrets.

APP_ENV = "production"
APP_BASE_URL = "https://your-app.streamlit.app"
AUTH_ENABLED = "true"
LOG_LEVEL = "INFO"

GOOGLE_OAUTH_CLIENT_ID = ""
GOOGLE_OAUTH_CLIENT_SECRET = ""
GOOGLE_OAUTH_REDIRECT_URI = "https://your-app.streamlit.app"

GITHUB_OAUTH_CLIENT_ID = ""
GITHUB_OAUTH_CLIENT_SECRET = ""
GITHUB_OAUTH_REDIRECT_URI = "https://your-app.streamlit.app"

USER_ROLE_MAP = '{"admin@example.com":"admin","analyst@example.com":"analyst"}'
DEFAULT_AUTH_ROLE = "viewer"
