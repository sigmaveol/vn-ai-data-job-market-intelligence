services:
  - type: web
    name: vn-job-market-intelligence
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_ENABLED
        value: false
      - key: LOG_LEVEL
        value: INFO
